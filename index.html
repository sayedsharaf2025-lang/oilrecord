<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظومة إدارة تغيير زيت أسطول السيارات السحابية</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-dark: #1e40af;
            --primary-light: #eff6ff;
            --accent: #f59e0b;
            --accent-light: #fef3c7;
            --success: #10b981;
            --success-light: #ecfdf5;
            --danger: #ef4444;
            --gray-bg: #f3f4f6;
            --gray-border: #e5e7eb;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8fafc; color: var(--text-dark); padding-bottom: 60px; min-height: 100vh; }

        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 20px 16px; text-align: center; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 50; }
        .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .status-badge { inline-size: max-content; margin: 0 auto; font-size: 11px; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; }

        /* Main Container */
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }

        /* Navigation Tabs */
        .tabs { display: flex; background: white; border-radius: var(--radius); padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--gray-border); }
        .tab-btn { flex: 1; border: none; background: none; padding: 10px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Cards */
        .card { background: white; border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--gray-border); }
        .card-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid var(--gray-bg); padding-bottom: 8px; }

        /* Forms */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-dark); }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-border); border-radius: 8px; font-size: 14px; background-color: white; outline: none; transition: border 0.2s; }
        input:focus, select:focus { border-color: var(--primary); }

        /* Buttons */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: white; padding: 6px 12px; font-size: 12px; width: auto; margin-top: 8px; }

        /* Vehicle List Cards */
        .car-card { background: white; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border-right: 5px solid var(--primary); box-shadow: var(--shadow); position: relative; }
        .car-card.alert-active { border-right-color: var(--danger); background: #fef2f2; }
        .car-card.alert-warning { border-right-color: var(--accent); background: #fffbeb; }
        .car-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .car-title-text { font-size: 15px; font-weight: 700; }
        .car-plate { font-size: 12px; background: var(--gray-bg); padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        
        .car-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; font-size: 12px; }
        .grid-item { background: var(--gray-bg); padding: 6px 8px; border-radius: 6px; }
        .car-card.alert-active .grid-item { background: #fee2e2; }
        .car-card.alert-warning .grid-item { background: #fef3c7; }
        .item-lbl { color: var(--text-muted); font-size: 10px; margin-bottom: 2px; }
        .item-val { font-weight: 700; }

        .alert-banner { margin-top: 8px; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 600; text-align: center; }
        .banner-danger { background: var(--danger); color: white; }
        .banner-warning { background: var(--accent); color: white; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-box { background: white; padding: 12px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); border: 1px solid var(--gray-border); }
        .stat-num { font-size: 18px; font-weight: 700; color: var(--primary); }
        .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header">
    <h1>🚗 إدارة زيت أسطول السيارات</h1>
    <div class="status-badge" id="cloudStatus">🔄 جاري المزامنة مع السحاب...</div>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('fleet')">📋 الأسطول</button>
        <button class="tab-btn" onclick="switchTab('add')">➕ إضافة سيارة</button>
        <button class="tab-btn" onclick="switchTab('logs')">📝 تحديث العداد</button>
    </div>

    <div id="tab-fleet">
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-num" id="totalCars">0</div>
                <div class="stat-lbl">إجمالي السيارات</div>
            </div>
            <div class="stat-box" style="border-right: 4px solid var(--danger);">
                <div class="stat-num" id="alertCars" style="color: var(--danger);">0</div>
                <div class="stat-lbl">سيارات تحتاج تغيير زيت</div>
            </div>
        </div>
        <div id="fleetList"></div>
    </div>

    <div id="tab-add" class="hidden">
        <div class="card">
            <div class="card-title">➕ تسجيل سيارة جديدة في المنظومة</div>
            <div class="form-group">
                <label>اسم السيارة / السائق</label>
                <input type="text" id="carName" placeholder="مثال: جامبو - أحمد علي">
            </div>
            <div class="form-group">
                <label>رقم اللوحة</label>
                <input type="text" id="carPlate" placeholder="مثال: ج ب أ 1234">
            </div>
            <div class="form-group">
                <label>قراءة العداد الحالية (كم)</label>
                <input type="number" id="currentKm" placeholder="مثال: 150000">
            </div>
            <div class="form-group">
                <label>نوع الزيت الحالي (بالكيلومتر)</label>
                <select id="oilType">
                    <option value="5000">5,000 كم</option>
                    <option value="10000" selected>10,000 كم</option>
                    <option value="7000">7,000 كم</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="addCar()">💾 حفظ السيارة سحابياً</button>
        </div>
    </div>

    <div id="tab-logs" class="hidden">
        <div class="card">
            <div class="card-title">📝 تحديث عداد الكيلومترات أو تسجيل تغيير زيت</div>
            <div class="form-group">
                <label>اختر السيارة</label>
                <select id="carSelect" onchange="onCarSelectChange()"></select>
            </div>
            <div class="form-group">
                <label>قراءة العداد الجديدة (كم)</label>
                <input type="number" id="updatedKm" placeholder="أدخل القراءة الحالية">
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 6px; font-weight: bold; color: var(--success); margin-top: 10px;">
                    <input type="checkbox" id="isOilChanged" style="width: auto;"> 🛢️ تم تغيير الزيت الآن في هذه الصيانة
                </label>
            </div>
            <button class="btn btn-primary" onclick="updateMileage()">🔄 تحديث البيانات سحابياً</button>
        </div>
    </div>
</div>

<script>
    // تم الربط المباشر بقاعدة بيانات مشروع oilrecord الخاص بك
    const FIREBASE_URL = "https://oilrecord-default-rtdb.firebaseio.com/";

    let localFleet = {};

    // الاتصال بـ Firebase
    async function dbRequest(path, method = 'GET', body = null) {
        try {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(`${FIREBASE_URL}${path}.json`, options);
            document.getElementById('cloudStatus').textContent = "☁️ متصل وسحابي";
            return await res.json();
        } catch (e) {
            document.getElementById('cloudStatus').textContent = "❌ غير متصل بالإنترنت";
            return null;
        }
    }

    async function loadData() {
        const data = await dbRequest('/fleet');
        if (data) localFleet = data;
        renderFleet();
        populateDropdown();
    }

    function renderFleet() {
        const listDiv = document.getElementById('fleetList');
        listDiv.innerHTML = '';
        
        let total = 0;
        let alerts = 0;

        for (let id in localFleet) {
            total++;
            const car = localFleet[id];
            
            // حساب الكيلومترات المستهلكة والمتبقية
            const kmDrivenSinceChange = car.currentKm - car.lastChangeKm;
            const kmRemaining = car.oilType - kmDrivenSinceChange;
            
            let alertClass = '';
            let isAlert = false;
            let isWarning = false;

            if (kmRemaining <= 0) {
                alertClass = 'alert-active';
                alerts++;
                isAlert = true;
            } else if (kmRemaining <= 500) {
                alertClass = 'alert-warning';
                isWarning = true;
            }

            const card = document.createElement('div');
            card.className = `car-card ${alertClass}`;
            card.innerHTML = `
                <div class="car-header">
                    <span class="car-title-text">${car.name}</span>
                    <span class="car-plate">${car.plate}</span>
                </div>
                <div class="car-grid">
                    <div class="grid-item"><div class="item-lbl">العداد الحالي</div><div class="item-val">${car.currentKm} كم</div></div>
                    <div class="grid-item"><div class="item-lbl">آخر تغيير زيت</div><div class="item-val">${car.lastChangeKm} كم</div></div>
                    <div class="grid-item"><div class="item-lbl">نوع الزيت</div><div class="item-val">${car.oilType} كم</div></div>
                    <div class="grid-item"><div class="item-lbl">المتبقي للتغيير</div><div class="item-val">${kmRemaining} كم</div></div>
                </div>
                ${isAlert ? '<div class="alert-banner banner-danger">⚠️ يجب تغيير الزيت فوراً! تجاورت المسافة المسموحة</div>' : ''}
                ${isWarning ? '<div class="alert-banner banner-warning">⚠️ اقترب موعد تغيير الزيت (أقل من 500 كم متبقي)</div>' : ''}
                <button class="btn btn-danger" onclick="deleteCar('${id}')">🗑️ حذف السيارة</button>
            `;
            listDiv.appendChild(card);
        }

        document.getElementById('totalCars').textContent = total;
        document.getElementById('alertCars').textContent = alerts;

        if (total === 0) {
            listDiv.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:30px; font-size:13px;">لا توجد سيارات مسجلة حالياً. اضغط على "إضافة سيارة" للبدء.</div>';
        }
    }

    async function addCar() {
        const name = document.getElementById('carName').value.trim();
        const plate = document.getElementById('carPlate').value.trim();
        const currentKm = parseInt(document.getElementById('currentKm').value);
        const oilType = parseInt(document.getElementById('oilType').value);

        if (!name || !plate || isNaN(currentKm)) { alert('يرجى ملء كافة الحقول بشكل صحيح'); return; }

        const id = 'car_' + Date.now();
        const newCar = {
            name,
            plate,
            currentKm,
            oilType,
            lastChangeKm: currentKm // عند البداية نعتبر أن الزيت تم تغييره عند العداد الحالي
        };

        localFleet[id] = newCar;
        await dbRequest(`/fleet/${id}`, 'PUT', newCar);
        
        // تفريغ الحقول
        document.getElementById('carName').value = '';
        document.getElementById('carPlate').value = '';
        document.getElementById('currentKm').value = '';
        
        alert('✅ تم حفظ السيارة بنجاح ومزامنتها سحابياً!');
        switchTab('fleet');
        loadData();
    }

    function populateDropdown() {
        const select = document.getElementById('carSelect');
        select.innerHTML = '<option value="">-- اختر السيارة من القائمة --</option>';
        for (let id in localFleet) {
            select.innerHTML += `<option value="${id}">${localFleet[id].name} (${localFleet[id].plate})</option>`;
        }
    }

    function onCarSelectChange() {
        const id = document.getElementById('carSelect').value;
        if(id && localFleet[id]) {
            document.getElementById('updatedKm').value = localFleet[id].currentKm;
        } else {
            document.getElementById('updatedKm').value = '';
        }
    }

    async function updateMileage() {
        const id = document.getElementById('carSelect').value;
        const newKm = parseInt(document.getElementById('updatedKm').value);
        const isOilChanged = document.getElementById('isOilChanged').checked;

        if (!id || isNaN(newKm)) { alert('يرجى اختيار السيارة وإدخال القراءة الجديدة للعداد'); return; }
        if (newKm < localFleet[id].currentKm) { alert('خطأ: لا يمكن للعداد الجديد أن يكون أقل من العداد الحالي للسيارة!'); return; }

        localFleet[id].currentKm = newKm;
        if (isOilChanged) {
            localFleet[id].lastChangeKm = newKm;
        }

        await dbRequest(`/fleet/${id}`, 'PUT', localFleet[id]);
        document.getElementById('isOilChanged').checked = false;
        document.getElementById('updatedKm').value = '';
        
        alert('🔄 تم تحديث قراءة العداد بنجاح سحابياً!');
        switchTab('fleet');
        loadData();
    }

    async function deleteCar(id) {
        if (confirm('⚠️ هل أنت متأكد من حذف هذه السيارة نهائياً من النظام السحابي؟')) {
            await dbRequest(`/fleet/${id}`, 'DELETE');
            delete localFleet[id];
            loadData();
        }
    }

    function switchTab(tab) {
        ['fleet', 'add', 'logs'].forEach(t => document.getElementById(`tab-${t}`).classList.add('hidden'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        if(tab === 'logs') populateDropdown();
    }

    // تحميل البيانات عند فتح الصفحة لأول مرة
    loadData();
</script>
</body>
</html>
